version: '3.8'
services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: <your-postgres-db-name>
      POSTGRES_USER: <your-postgres-user>
      POSTGRES_PASSWORD: <your-postgres-password>
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
